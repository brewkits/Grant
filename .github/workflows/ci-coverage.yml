name: "Coverage Report (KMP & iOS)"

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  coverage:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run KMP Coverage (Kover)
        run: ./gradlew :grant-core:koverHtmlReport :grant-core:koverVerify :grant-compose:koverHtmlReport :grant-bluetooth:koverHtmlReport :grant-location-always:koverHtmlReport

      - name: Upload KMP Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: kmp-coverage-report
          path: |
            grant-core/build/reports/kover/html
            grant-compose/build/reports/kover/html
            grant-bluetooth/build/reports/kover/html
            grant-location-always/build/reports/kover/html
