name: "Coverage Report (KMP & iOS)"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. Run Kotlin Multiplatform Tests & Coverage (Android & iOS Simulator)
      - name: Run KMP Coverage (Kover)
        run: ./gradlew koverHtmlReport koverVerify

      # 2. Run Native iOS App Tests & Coverage (Slather)
      - name: Install Slather
        run: gem install slather

      - name: Run iOS App Tests
        run: |
          xcodebuild test \
            -project demo/iosApp/GrantDemo/GrantDemo.xcodeproj \
            -scheme GrantDemo \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -derivedDataPath Build/ \
            enableCodeCoverage=YES

      - name: Export iOS Coverage (Slather)
        run: |
          slather coverage \
            --html \
            --project demo/iosApp/GrantDemo/GrantDemo.xcodeproj \
            --scheme GrantDemo \
            --output-directory build/reports/slather \
            demo/iosApp/GrantDemo/GrantDemo.xcodeproj

      # 3. Upload Reports
      - name: Upload KMP Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: kmp-coverage-report
          path: |
            grant-core/build/reports/kover/html
            grant-compose/build/reports/kover/html

      - name: Upload iOS Native Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-coverage-report
          path: build/reports/slather
